<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>We Design. | Central Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root { --ink: #111; --gray-100: #f3f4f6; --gray-200: #e5e7eb; --accent: #7c3aed; --grad: linear-gradient(135deg,#e040fb,#7c3aed,#06b6d4); }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; color: var(--ink); background: #fafafa; line-height: 1.5; }
    .page { display: none; min-height: 100vh; }
    .page.active { display: block; }
    
    /* UI Components */
    .btn-primary { background: var(--ink); color: #fff; border: none; padding: 12px 24px; border-radius: 10px; font-weight: 600; cursor: pointer; transition: 0.2s; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    .badge { padding: 4px 12px; border-radius: 99px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
    .badge-inprogress { background: #fef9c3; color: #854d0e; }
    
    /* Layouts */
    .dash-container { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; }
    .sidebar { border-right: 1px solid var(--gray-200); background: #fff; padding: 24px; display: flex; flex-direction: column; }
    .main-content { padding: 40px; }
    .card { background: #fff; border: 1px solid var(--gray-200); border-radius: 16px; padding: 24px; margin-bottom: 20px; }
    
    /* Messaging */
    #chat-history { height: 300px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; padding: 10px; margin-bottom: 20px; }
    .msg-bubble { max-width: 80%; padding: 12px 16px; border-radius: 14px; font-size: 14px; }
    .msg-studio { align-self: flex-start; background: var(--gray-100); color: var(--ink); }
    .msg-client { align-self: flex-end; background: var(--ink); color: #fff; }

    /* Hero Parallax */
    .hero-right { perspective: 1000px; display: flex; justify-content: center; align-items: center; }
    .card-stack { position: relative; width: 300px; height: 200px; transform-style: preserve-3d; transition: transform 0.1s ease; }
    .creator-card { position: absolute; width: 100%; height: 100%; border-radius: 12px; background: var(--grad); box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
  </style>
</head>
<body>

  <div id="page-landing" class="page active">
    <nav style="display:flex; justify-content:space-between; padding:20px 40px; align-items:center">
      <div style="font-weight:800; font-size:20px">WE DESIGN.</div>
      <div id="auth-controls">
         <button class="btn-primary" onclick="toggleLoginModal()">Client Login</button>
      </div>
    </nav>
    
    <div style="display:grid; grid-template-columns: 1fr 1fr; padding:100px 40px; align-items:center">
      <div>
        <h1 style="font-size:64px; font-weight:800; margin-bottom:20px">Design for the <span style="background:var(--grad); -webkit-background-clip:text; -webkit-text-fill-color:transparent;">Modern Era.</span></h1>
        <p style="font-size:18px; color:#666; margin-bottom:30px; max-width:450px">Your dedicated design hub. No emails, no clutter. Just progress.</p>
        <div style="display:flex; gap:12px">
          <input id="login-email" type="email" placeholder="Enter email" style="padding:12px; border:1px solid #ddd; border-radius:10px; width:250px">
          <button class="btn-primary" onclick="handleLogin()">Enter Hub</button>
        </div>
      </div>
      <div class="hero-right">
        <div class="card-stack" id="heroCard">
          <div class="creator-card"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="page-client" class="page">
    <div class="dash-container">
      <aside class="sidebar">
        <div style="font-weight:800; margin-bottom:40px">WE DESIGN.</div>
        <nav style="display:flex; flex-direction:column; gap:10px; flex:1">
          <a href="#" style="text-decoration:none; color:var(--ink); font-weight:600">Overview</a>
          <a href="#" style="text-decoration:none; color:#666">Deliverables</a>
          <a href="#" style="text-decoration:none; color:#666">Messages</a>
        </nav>
        <button onclick="logout()" style="border:none; background:none; color:red; cursor:pointer; text-align:left">Logout</button>
      </aside>
      <main class="main-content">
        <h2 id="client-project-name" style="font-size:28px; margin-bottom:8px">Project Loading...</h2>
        <div class="card">
          <div style="display:flex; justify-content:space-between; margin-bottom:10px">
            <span>Project Progress</span>
            <span id="progress-text">0%</span>
          </div>
          <div style="height:8px; background:#eee; border-radius:4px; overflow:hidden">
            <div id="progress-bar" style="width:0%; height:100%; background:var(--ink); transition:1s ease"></div>
          </div>
        </div>
        
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px">
          <div class="card">
            <h3>Files</h3>
            <div id="file-list" style="margin-top:15px"></div>
          </div>
          <div class="card">
            <h3>Messages</h3>
            <div id="chat-history"></div>
            <div style="display:flex; gap:10px">
              <input id="msg-input" style="flex:1; padding:10px; border:1px solid #ddd; border-radius:8px">
              <button class="btn-primary" onclick="sendMessage()">Send</button>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <div id="page-designer" class="page">
    <div class="main-content" style="max-width:1000px; margin:0 auto">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:40px">
        <h1>Designer Command Center</h1>
        <button onclick="logout()">Logout</button>
      </div>
      <div id="admin-project-grid" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap:20px">
        </div>
    </div>
  </div>

  <script>
    const CONFIG = {
      API: 'https://script.google.com/macros/s/AKfycbwwuqrIlOwo3ahMPgxHcjqsezOr8ZpTRYF1xGhkZhN-z8vfys-ITQQc_nEQovbIfMV_/exec',
      DesignerEmail: 'hello@wedesignsstuddio.com'
    };

    let currentUser = null;

    // --- Core Logic ---
    async function handleLogin() {
      const email = document.getElementById('login-email').value.trim().toLowerCase();
      if(!email) return;

      try {
        const res = await fetch(`${CONFIG.API}?action=getDashboard&email=${email}`);
        const data = await res.json();

        if(data.error) {
          alert("No project found for this email.");
          return;
        }

        localStorage.setItem('userEmail', email);
        renderView(data);
      } catch (e) {
        console.error("Login Error", e);
      }
    }

    function renderView(data) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      
      if(data.role === 'designer') {
        document.getElementById('page-designer').classList.add('active');
        renderDesigner(data.projects);
      } else {
        document.getElementById('page-client').classList.add('active');
        renderClient(data);
      }
    }

    function renderClient(data) {
      currentUser = data.project;
      document.getElementById('client-project-name').innerText = data.project.name;
      document.getElementById('progress-bar').style.width = data.project.progress + '%';
      document.getElementById('progress-text').innerText = data.project.progress + '%';

      // Files
      const fileList = document.getElementById('file-list');
      fileList.innerHTML = data.files.map(f => `
        <div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid #eee">
          <span>${f.filename}</span>
          <a href="${f.url}" target="_blank" style="color:var(--accent); font-weight:600">Download</a>
        </div>
      `).join('');

      // Messages
      const chat = document.getElementById('chat-history');
      chat.innerHTML = data.messages.map(m => `
        <div class="msg-bubble ${m.sender === 'Tk' ? 'msg-studio' : 'msg-client'}">
          <strong>${m.sender}:</strong> ${m.text}
        </div>
      `).join('');
      chat.scrollTop = chat.scrollHeight;
    }

    function renderDesigner(projects) {
      const grid = document.getElementById('admin-project-grid');
      grid.innerHTML = projects.map(p => `
        <div class="card">
          <h3>${p.name}</h3>
          <p style="color:#666; font-size:14px">${p.email}</p>
          <div style="margin:15px 0">
            <span class="badge badge-inprogress">${p.status}</span>
          </div>
          <button class="btn-primary" style="width:100%" onclick="window.open('https://docs.google.com/spreadsheets/d/12mEL1l6YiVznkkUWwTEYFK5RPW-OgC9F31AITYSyfvE/edit')">Edit in Sheets</button>
        </div>
      `).join('');
    }

    async function sendMessage() {
      const input = document.getElementById('msg-input');
      const text = input.value.trim();
      if(!text || !currentUser) return;

      const payload = {
        action: 'sendMessage',
        projectId: currentUser.id,
        sender: 'Client',
        text: text
      };

      // Optimistic UI update
      const chat = document.getElementById('chat-history');
      chat.innerHTML += `<div class="msg-bubble msg-client"><strong>You:</strong> ${text}</div>`;
      input.value = '';

      await fetch(CONFIG.API, {
        method: 'POST',
        mode: 'no-cors', // Apps Script requirement
        body: JSON.stringify(payload)
      });
    }

    function logout() {
      localStorage.removeItem('userEmail');
      location.reload();
    }

    // --- Init ---
    window.onload = () => {
      const savedEmail = localStorage.getItem('userEmail');
      if(savedEmail) {
        document.getElementById('login-email').value = savedEmail;
        handleLogin();
      }
    };

    // Hero Animation
    const heroCard = document.getElementById('heroCard');
    document.addEventListener('mousemove', (e) => {
      const x = (window.innerWidth / 2 - e.pageX) / 25;
      const y = (window.innerHeight / 2 - e.pageY) / 25;
      heroCard.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
    });
  </script>
</body>
</html>
